name: Lighthouse Audit

on:
  workflow_dispatch:

schedule:
  - cron: '40 13 * * *'

permissions:
  contents: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verify Chrome
        run: google-chrome --version

      - name: Install dependencies
        run: npm install

      - name: Create reports folder
        run: mkdir -p reports

      - name: Run Lighthouse Mobile
        env:
          CHROME_PATH: /opt/hostedtoolcache/setup-chrome/chromium/stable/x64/chrome
        run: npm run lighthouse:mobile

      - name: Run Lighthouse Desktop
        env:
          CHROME_PATH: /opt/hostedtoolcache/setup-chrome/chromium/stable/x64/chrome
        run: npm run lighthouse:desktop

      - name: Update History
        run: npm run history

      - name: Generate Markdown Report
        run: npm run report

      - name: Send Email
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: npm run mail

      - name: Commit History & Report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add history/history.csv
          git add reports/

          if ! git diff --cached --quiet; then
            git commit -m "Daily Lighthouse Report"
            git push
          else
            echo "No changes."
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: reports/
